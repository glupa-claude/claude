apiVersion: apps/v1
kind: Deployment
metadata:
  name: macos-webserver
  labels:
    app: macos-webserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: macos-webserver
  template:
    metadata:
      labels:
        app: macos-webserver
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 24Mi
            limits:
              memory: 64Mi
      volumes:
        - name: site
          configMap:
            name: macos-webserver-site
---
apiVersion: v1
kind: Service
metadata:
  name: macos-webserver
spec:
  selector:
    app: macos-webserver
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: macos-webserver
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
spec:
  tls:
    - hosts:
        - macos-webserver.macos-lab.local
      secretName: macos-webserver-tls
  rules:
    - host: macos-webserver.macos-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: macos-webserver
                port:
                  number: 80
